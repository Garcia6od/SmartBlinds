<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/all.css' %}">
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body class="ejemplo">
<main>
    <article>
        <h1> Registrar</h1>
        <form method="POST" action="{% url 'register_user' %}">
            {% csrf_token %}
            <div class="input-group">
            <input class="input-lg" type="text" name="email" placeholder="Correo Electronico" required>
            </div>
            <div class="input-group">
            <input class="input-lg" type="text" name="username" placeholder="Usuario" required>
            </div>
            <div class="input-group">
            <input class="input-lg" type="password" name="password" placeholder="Contraseña" required>
            </div>
            <button class="btn-register" type="submit">Crear Cuenta</button>

            ¿Ya tienes Cuenta? <a href="{% url 'login1' %}"> Iniciar Sesión</a>
        </form>
    </article>
</main>
</body>

</html>
